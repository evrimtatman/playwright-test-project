name: Playwright API Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t bookstore-api-tests .

      - name: Run tests
        run: docker run --rm bookstore-api-tests